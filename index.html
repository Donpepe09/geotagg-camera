<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeStamp Pro Camera</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <!-- Camera Preview -->
        <div class="camera-viewport">
            <video id="video" autoplay playsinline muted></video>
            
            <div id="flash-effect" class="flash-layer"></div>

            <!-- Live Overlay UI -->
            <div id="live-overlay" class="overlay-container">
                <div class="overlay-top">
                    <div id="gps-status" class="badge">🛰️ GPS: Acquiring...</div>
                    <div id="compass-display" class="badge">🧭 --°</div>
                </div>
                <div class="overlay-bottom">
                    <div class="meta-left">
                        <div class="meta-block">
                            <div id="date-display" class="primary-text">--/--/----</div>
                            <div id="time-display" class="secondary-text">00:00:00</div>
                        </div>
                        <div class="meta-block">
                            <div id="address-display" class="primary-text">Detecting Address...</div>
                            <div id="coords-display" class="secondary-text">0.0000, 0.0000</div>
                        </div>
                    </div>
                    <div class="meta-right">
                        <div id="project-display" class="primary-text">TIMESTAMP PRO CAMERA</div>
                        <div id="inspector-display" class="secondary-text"></div>
                    </div>
                </div>
            </div>

            <!-- Grid Lines -->
            <div id="grid-lines" class="grid-overlay hidden">
                <div class="v-line" style="left: 33.3%;"></div>
                <div class="v-line" style="left: 66.6%;"></div>
                <div class="h-line" style="top: 33.3%;"></div>
                <div class="h-line" style="top: 66.6%;"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="camera-controls">
            <div class="control-group">
                <button id="toggle-grid" title="Toggle Grid">🌐</button>
                <button id="switch-camera" title="Switch Camera">🔄</button>
            </div>
            
            <button id="shutter" class="shutter-btn">
                <div class="shutter-inner"></div>
            </button>
            
            <div class="control-group">
                <button id="open-settings" title="Settings">⚙️</button>
                <button id="open-gallery" title="Gallery">🖼️</button>
            </div>
        </div>

        <!-- Hidden rendering canvas -->
        <canvas id="capture-canvas" style="display:none;"></canvas>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Settings</h3>
                    <button id="close-settings" class="icon-btn">✕</button>
                </div>
                <div class="modal-body">
                    <section class="settings-section">
                        <h4>Display Options</h4>
                        <div class="setting-item">
                            <label>Time Format</label>
                            <select id="setting-time-format">
                                <option value="12h">12-Hour (AM/PM)</option>
                                <option value="24h">24-Hour</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>Text Color</label>
                            <input type="color" id="setting-font-color" value="#ffffff">
                        </div>
                        <div class="setting-item">
                            <label>Overlay Opacity</label>
                            <input type="range" id="setting-opacity" min="0" max="0.9" step="0.1" value="0.4">
                        </div>
                    </section>

                    <section class="settings-section">
                        <h4>Project Information</h4>
                        <div class="setting-item">
                            <label>Project Name</label>
                            <input type="text" id="setting-project-name" placeholder="e.g. Site Inspection A">
                        </div>
                        <div class="setting-item">
                            <label>Inspector Name</label>
                            <input type="text" id="setting-inspector" placeholder="Your Name">
                        </div>
                    </section>
                </div>
                <div class="modal-footer">
                    <button id="save-settings" class="primary-btn">Apply Settings</button>
                </div>
            </div>
        </div>

        <!-- Gallery Modal -->
        <div id="gallery-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Gallery</h3>
                    <button id="close-gallery" class="icon-btn">✕</button>
                </div>
                <div id="gallery-grid" class="modal-body gallery-grid">
                    <!-- Photos will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    
    <script src="camera.js"></script>
    <script src="location.js"></script>
    <script src="app.js"></script>
</body>
</html>
